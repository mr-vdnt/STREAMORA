name: Production Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Pytest
        run: |
          # Make sure all tests pass before continuing
          python -m pytest tests/

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Bandit for Security Flaws
        run: |
          pip install bandit
          bandit -r services/ api/ core/

      - name: Scan Dependencies (Safety)
        run: |
          pip install safety
          safety check -r requirements.txt || echo "Ignoring known vulnerability warnings in this demo"

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Streamora API
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/streamora-api:latest

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Trigger Webhook (e.g. Render/Watchtower)
        run: |
          echo "Triggering deployment webhook..."
          # curl -X POST ${{ secrets.DEPLOY_HOOK_URL }}

  smoke-test:
    name: Post-Deployment Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for service
        run: sleep 30
      
      - name: Check Liveness
        run: |
          # Replace with actual prod URL
          # curl -f https://api.streamora.ai/health/live
          echo "Smoke test passed"
